<!DOCTYPE html>
<html>
<head>
    <title>Video Sayfam</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
        }

        .video-box {
            margin-top: 30px;
        }

        video {
            width: 80%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<h1>🎬 VİDEO DENEME</h1>

<div class="video-box">
    <video id="video" controls>
        <source src="IMG_0006.MP4" type="IMG_0006.MP4">
        Tarayıcın video desteklemiyor.
    </video>
</div>

<button onclick="playVideo()">▶ Oynat</button>
<button onclick="pauseVideo()">⏸ Durdur</button>

<script>
function playVideo() {
    document.getElementById("video").play();
}

function pauseVideo() {
    document.getElementById("video").pause();
}
</script>

</body>
</html>
